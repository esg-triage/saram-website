document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

iv style=\"max-width:1200px;margin:0 auto;padding:clamp(60px,9vh,108px) clamp(20px,5vw,40px) clamp(44px,6vh,64px);position:relative\">\n      <div data-reveal=\"\" style=\"display:inline-flex;align-items:center;gap:10px;font-family:'Space Mono',monospace;font-size:0.74rem;font-weight:700;letter-spacing:0.2em;text-transform:uppercase;color:var(--ink2)\">\n        <span style=\"width:22px;height:1px;background:var(--ink2)\"><\/span>Dual-practice advisory firm\n      <\/div>\n      <h1 data-reveal=\"\" style=\"margin:22px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-weight:800;letter-spacing:-0.028em;line-height:1.02;font-size:clamp(2.5rem,6.2vw,5rem);max-width:15ch\"><span style=\"color:var(--ariba)\">SAP Ariba<\/span> consulting. <span style=\"color:var(--esg)\">Corporate ESG<\/span> consulting. Two independent practices.<\/h1>\n      <p data-reveal=\"\" style=\"margin:26px 0 0;font-size:clamp(1.05rem,1.6vw,1.25rem);color:var(--ink2);max-width:58ch;line-height:1.62\">Saram Digitech is an independent, consultant-led firm with two specialist practices \u2014 SAP Ariba and Corporate ESG. Each is run by practitioners and engaged on its own terms: you work with the practice you need, without one being bundled into the other.<\/p>\n      <div data-reveal=\"\" style=\"display:flex;gap:14px;flex-wrap:wrap;margin-top:34px\">\n        <a href=\"#divisions\" style=\"text-decoration:none;background:var(--ink);color:#fff;font-weight:600;padding:15px 28px;border-radius:100px;transition:transform .25s ease,box-shadow .25s ease\" style-hover=\"transform:translateY(-2px);box-shadow:0 12px 30px rgba(35,33,51,0.24)\">Explore our divisions<\/a>\n        <a href=\"#contact\" style=\"text-decoration:none;border:1px solid var(--line);color:var(--ink);font-weight:600;padding:15px 28px;border-radius:100px;transition:border-color .25s ease,background .25s ease\" style-hover=\"border-color:var(--ink);background:rgba(35,33,51,0.03)\">Talk to an expert<\/a>\n      <\/div>\n    <\/div>\n\n    <!-- DUAL SPLIT -->\n    <div id=\"divisions\" style=\"max-width:1200px;margin:0 auto;padding:8px clamp(20px,5vw,40px) clamp(56px,8vh,88px);scroll-margin-top:90px\">\n      <div class=\"grid2\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:26px\">\n        <a data-reveal=\"\" href=\"#ariba\" style=\"text-decoration:none;color:var(--ink);position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 32px 30px;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 50px rgba(63,61,158,0.16)\">\n          <span style=\"position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--ariba),var(--ariba2))\"><\/span>\n          <span style=\"font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--ariba)\">Division 01<\/span>\n          <h3 style=\"margin:13px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:-0.02em\">SAP Ariba Consulting<\/h3>\n          <p style=\"margin:11px 0 0;font-style:italic;font-size:1.18rem;color:var(--ariba);line-height:1.4\">Essence to your Source-to-Pay transformation.<\/p>\n          <p style=\"margin:14px 0 0;color:var(--ink2);font-size:0.98rem\">Source-to-Contract and Procure-to-Pay implementation, support, and independent commercial advisory.<\/p>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:20px\">\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--ariba);background:rgba(63,61,158,0.08);padding:6px 12px;border-radius:100px\">Source-to-Contract<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--ariba);background:rgba(63,61,158,0.08);padding:6px 12px;border-radius:100px\">Procure-to-Pay<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--ariba);background:rgba(63,61,158,0.08);padding:6px 12px;border-radius:100px\">Support<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--ariba);background:rgba(63,61,158,0.08);padding:6px 12px;border-radius:100px\">Advisory<\/span>\n          <\/div>\n          <span style=\"margin-top:24px;font-weight:600;color:var(--ariba);display:inline-flex;align-items:center;gap:8px\">Explore SAP Ariba <svg width=\"18\" height=\"14\" viewBox=\"0 0 18 14\" aria-hidden=\"true\"><path d=\"M1 7 H16 M11 2 L16 7 L11 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\/path><\/svg><\/span>\n        <\/a>\n        <a data-reveal=\"\" href=\"#esg\" style=\"text-decoration:none;color:var(--ink);position:relative;display:flex;flex-direction:column;background:#fff;border:1px solid var(--line);border-radius:22px;padding:34px 32px 30px;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-5px);box-shadow:0 22px 50px rgba(15,138,147,0.16)\">\n          <span style=\"position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,var(--esg),var(--esg2))\"><\/span>\n          <span style=\"font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--esg)\">Division 02<\/span>\n          <h3 style=\"margin:13px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.7rem;font-weight:700;letter-spacing:-0.02em\">ESG Consulting<\/h3>\n          <p style=\"margin:11px 0 0;font-style:italic;font-size:1.18rem;color:var(--esg);line-height:1.4\">Credible, measurable, audit-ready sustainability.<\/p>\n          <p style=\"margin:14px 0 0;color:var(--ink2);font-size:0.98rem\">ESG strategy, energy audits, GHG accounting and product carbon footprints \u2014 aligned to BRSR, CCTS, CBAM, CSRD, ISO and the GHG Protocol.<\/p>\n          <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-top:20px\">\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.09);padding:6px 12px;border-radius:100px\">ESG Strategy<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.09);padding:6px 12px;border-radius:100px\">Energy Audit<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.09);padding:6px 12px;border-radius:100px\">GHG Verification<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.09);padding:6px 12px;border-radius:100px\">BRSR<\/span>\n          <\/div>\n          <span style=\"margin-top:24px;font-weight:600;color:var(--esg);display:inline-flex;align-items:center;gap:8px\">Explore ESG Consulting <svg width=\"18\" height=\"14\" viewBox=\"0 0 18 14\" aria-hidden=\"true\"><path d=\"M1 7 H16 M11 2 L16 7 L11 12\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><\/path><\/svg><\/span>\n        <\/a>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- DIVISION 01 : SAP ARIBA -->\n  <section id=\"ariba\" style=\"background:var(--paper);border-top:1px solid var(--line);scroll-margin-top:76px;padding:clamp(64px,10vh,116px) 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,40px)\">\n      <div class=\"divhead\" style=\"display:grid;grid-template-columns:0.92fr 1.08fr;gap:54px;align-items:start\">\n        <div data-reveal=\"\">\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--ariba)\"><span style=\"width:22px;height:1px;background:var(--ariba)\"><\/span>Division 01 \u2014 SAP Ariba<\/div>\n          <h2 style=\"margin:18px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(2rem,3.6vw,2.85rem);font-weight:800;letter-spacing:-0.025em;line-height:1.06\">Source-to-Pay, implemented by people who have run it.<\/h2>\n          <p style=\"margin:18px 0 0;font-style:italic;font-size:1.3rem;color:var(--ariba);line-height:1.4\">Essence to your Source-to-Pay transformation.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"padding-top:6px\">\n          <p style=\"margin:0;font-size:1.1rem;color:var(--ink2);line-height:1.66\">We advise and implement across the full SAP Ariba suite \u2014 from strategic sourcing and contracts to guided buying, invoicing and payment. Whether you are deploying for the first time, stabilising a live environment, or questioning the commercials of your licensing, we bring independent, hands-on expertise.<\/p>\n          <p style=\"margin:16px 0 0;font-size:0.92rem;color:var(--ink2);font-style:italic;opacity:0.85\">Placeholder copy for the Ariba division \u2014 ready for you to refine.<\/p>\n        <\/div>\n      <\/div>\n\n      <div data-reveal=\"\" class=\"svc-grid\" style=\"display:grid;grid-template-columns:1fr 1fr;gap:1px;background:var(--line);border:1px solid var(--line);border-radius:18px;overflow:hidden;margin-top:48px\">\n        <sc-for list=\"{{ aribaServices }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <div style=\"background:#fff;padding:30px 30px 32px;transition:background .3s ease\" style-hover=\"background:#FAFAFC\">\n            <span style=\"font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--ariba)\">{{ s.n }}<\/span>\n            <h4 style=\"margin:10px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.18rem;font-weight:700;letter-spacing:-0.01em\">{{ s.title }}<\/h4>\n            <p style=\"margin:9px 0 0;color:var(--ink2);font-size:0.98rem\">{{ s.desc }}<\/p>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      \n    <\/div>\n  <\/section>\n\n  <!-- DIVISION 02 : ESG -->\n  <section id=\"esg\" style=\"background:var(--teal-tint);border-top:1px solid var(--line);scroll-margin-top:76px;padding:clamp(64px,10vh,116px) 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,40px)\">\n      <div class=\"divhead\" style=\"display:grid;grid-template-columns:0.92fr 1.08fr;gap:54px;align-items:start\">\n        <div data-reveal=\"\">\n          <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--esg)\"><span style=\"width:22px;height:1px;background:var(--esg)\"><\/span>Division 02 \u2014 ESG Consulting<\/div>\n          <h2 style=\"margin:18px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:clamp(2rem,3.6vw,2.85rem);font-weight:800;letter-spacing:-0.025em;line-height:1.06\">An ESG program that is credible, measurable and real.<\/h2>\n          <p style=\"margin:18px 0 0;font-style:italic;font-size:1.3rem;color:var(--esg);line-height:1.4\">From materiality to verified disclosure.<\/p>\n        <\/div>\n        <div data-reveal=\"\" style=\"padding-top:6px\">\n          <p style=\"margin:0;font-size:1.1rem;color:var(--ink2);line-height:1.66\">ESG is no longer optional. With BRSR and CCTS in India and CBAM, CSRD and buyer audits (PSCI, EcoVadis) in Europe, verified data is now a condition of market access. We help you build a program that holds up to scrutiny and drives real operational change \u2014 energy audits, GHG accounting, product carbon footprints and BRSR readiness \u2014 backed by empanelled energy auditors and accredited GHG verifiers. We prepare you; independent accredited bodies verify.<\/p>\n        <\/div>\n      <\/div>\n\n      <div data-reveal=\"\" class=\"tier3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px\">\n        <sc-for list=\"{{ esgPillars }}\" as=\"p\" hint-placeholder-count=\"3\">\n          <div style=\"background:#fff;border:1px solid var(--line);border-radius:18px;padding:30px 28px 30px;position:relative;overflow:hidden;transition:transform .3s ease,box-shadow .3s ease\" style-hover=\"transform:translateY(-4px);box-shadow:0 20px 46px rgba(15,138,147,0.12)\">\n            <span style=\"position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--esg),var(--esg2))\"><\/span>\n            <span style=\"font-family:'Space Mono',monospace;font-size:1.05rem;font-weight:700;color:var(--esg)\">{{ p.n }}<\/span>\n            <h4 style=\"margin:10px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.24rem;font-weight:700;letter-spacing:-0.01em;line-height:1.2\">{{ p.title }}<\/h4>\n            <p style=\"margin:11px 0 0;color:var(--ink2);font-size:0.96rem\">{{ p.desc }}<\/p>\n            <div style=\"display:flex;flex-wrap:wrap;gap:7px;margin-top:18px\">\n              <sc-for list=\"{{ p.tags }}\" as=\"tag\" hint-placeholder-count=\"4\">\n                <span style=\"font-size:0.74rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.08);padding:5px 11px;border-radius:100px;border:1px solid rgba(15,138,147,0.16)\">{{ tag }}<\/span>\n              <\/sc-for>\n            <\/div>\n          <\/div>\n        <\/sc-for>\n      <\/div>\n\n      <div data-reveal=\"\" style=\"margin-top:54px\">\n        <div style=\"display:inline-flex;align-items:center;gap:9px;font-family:'Space Mono',monospace;font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--esg)\"><span style=\"width:22px;height:1px;background:var(--esg)\"><\/span>Industries we serve<\/div>\n        <h3 style=\"margin:14px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:-0.01em\">Sectors our ESG practice works across<\/h3>\n        <p style=\"margin:10px 0 0;color:var(--ink2);font-size:1rem;line-height:1.62;max-width:72ch\">Deep, sector-specific ESG, energy and carbon expertise \u2014 with particular focus on the industries facing CBAM, CCTS, BRSR 2px;border-radius:100px\">Food, Agri & Botanical Extracts<\/span>\n            <span style=\"font-size:0.8rem;font-weight:600;color:var(--esg);background:rgba(15,138,147,0.09);padding:6px 12px;border-radius:100px\">Aquaculture & Seafood<\/span>\n        <\/div>\n      <\/div>\n\n      <div data-reveal=\"\" style=\"margin-top:54px\">\n        <div style=\"display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px\">\n          <h3 style=\"margin:0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.3rem;font-weight:700;letter-spacing:-0.01em\">How we engage<\/h3>\n          <a href=\"#engagement\" style=\"text-decoration:none;color:var(--esg);font-weight:600;font-size:0.95rem\">Our shared 3-step method \u2192<\/a>\n        <\/div>\n        <div class=\"tier3\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:20px\">\n          <sc-for list=\"{{ esgTiers }}\" as=\"t\" hint-placeholder-count=\"3\">\n            <div style=\"background:#fff;border:1px solid var(--line);border-top:3px solid var(--esg);border-radius:16px;padding:26px 24px 28px\">\n              <div style=\"display:flex;align-items:center;gap:11px\"><span style=\"display:flex;align-items:center;justify-content:center;width:34px;height:34px;border-radius:50%;background:rgba(15,138,147,0.11);color:var(--esg);font-weight:700;font-size:0.95rem\">{{ t.num }}<\/span><span style=\"font-family:'Space Mono',monospace;font-size:0.7rem;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;color:var(--ink2)\">Step {{ t.num }}<\/span><\/div>\n              <h4 style=\"margin:16px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.18rem;font-weight:700;letter-spacing:-0.01em\">{{ t.name }}<\/h4>\n              <p style=\"margin:4px 0 0;font-size:0.85rem;font-weight:600;color:var(--esg)\">{{ t.sub }}<\/p>\n              <p style=\"margin:11px 0 0;color:var(--ink2);font-size:0.95rem\">{{ t.desc }}<\/p>\n            <\/div>\n          <\/sc-fo  <p style=\"margin:20px 0 0;font-size:1.15rem;color:var(--ink2);line-height:1.64\">Whether the work is a Source-to-Pay rollout or an ESG program, we move through the same three deliberate tiers \u2014 so every engagement starts with clarity and ends with delivered outcomes.<\/p>\n      <\/div>\n\n      <div data-reveal=\"\" style=\"margin-top:50px\">\n        <div style=\"height:2px;background:linear-gradient(90deg,var(--esg2),var(--ariba2));border-radius:2px;margin-bottom:30px\"><\/div>\n        <div class=\"step-row\" style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:34px\">\n          <sc-for list=\"{{ steps }}\" as=\"st\" hint-placeholder-count=\"3\">\n            <div>\n              <span style=\"font-family:'Bricolage Grotesque',sans-serif;font-weight:800;font-size:3rem;line-height:1;background:linear-gradient(120deg,#23A8B6,#5E60C9);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;color:transparent\">{{ st.num }}<\/span>\n              <h3 style=\"margin:14px 0 0;font-family:'Bricolage Grotesque',sans-serif;font-size:1.45rem;font-weight:700;letter-spacing:-0.015em\">{{ st.name }}<\/h3>\n              <p style=\"margin:5px 0 0;font-family:'Space Mono',monospace;font-size:0.78rem;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink2)\">{{ st.sub }}<\/p>\n              <p style=\"margin:14px 0 0;color:var(--ink2);font-size:1rem;line-height:1.6\">{{ st.desc }}<\/p>\n            <\/div>\n          <\/sc-for>\n        <\/div>\n      <\/div>\n    <\/div>\n  <\/section>\n\n  <!-- TRAINING ACADEMY (secondary) -->\n  <section style=\"background:var(--paper2);border-top:1px solid var(--line);scroll-margin-top:76px;padding:clamp(56px,8vh,92px) 0\">\n    <div style=\"max-width:1200px;margin:0 auto;padding:0 clamp(20px,5vw,40px)\">\n      <div class=\"divhead\" style=\"display:grid;grid-template-columns:0.92fr 1.08fr;gap:54px;align-items:center\">\n        <div data-reveal=\"\">\n          <div styl nts = [\n      { n: '01', t: 'Scope 1-3 GHG Accounting', d: 'A full greenhouse-gas inventory on the GHG Protocol, including supply-chain (Scope 3) emissions.' },\n      { n: '02', t: 'Product Carbon Footprints (ISO 14067)', d: 'Per-product footprints for CBAM, buyer and net-zero tender requirements.' },\n      { n: '03', t: 'Supplier & Value-Chain ESG Data', d: 'Collect supplier ESG and emissions data from your existing ERP or e-procurement tools, whichever you run.' },\n      { n: '04', t: 'Audit-Ready Disclosure', d: 'BRSR, CCTS and CSRD-aligned data prepared for independent verification: we prepare, accredited bodies verify.' },\n    ];\n    const aribaTiers = [\n      { num: '1', name: 'Initial Assessment', sub: 'Scoping & readiness snapshot', desc: 'Source-to-Pay maturity scan, stakeholder mapping, and a licensing & scope review.' },\n      { num: '2', name: 'Baseline Audit', sub: 'Deep diagnostic & gap analysis', desc: 'Process and configuration diagnostic across S2C and P2P, with integration and data-quality gaps surfaced.' },\n      { num: '3', name: 'Advisory Consulting', sub: 'Ongoing implementation & guidance', desc: 'Hands-on implementation, commercial advisory, and continuous optimisation.' },\n    ];\n    const esgTiers = [\n      { num: '1', name: 'Initial Assessment', sub: 'Scoping & readiness snapshot', desc: 'ESG materiality assessment, baseline & gap analysis, and a regulatory-readiness review across BRSR, GRI and TCFD.' },\n      { num: '2', name: 'Baseline Audit', sub: 'Deep diagnostic & gap analysis', desc: 'Energy audit and Scope 1\u00b72\u00b73 GHG inventory establishing your verified baseline and data systems.' },\n      { num: '3', name: 'Advisory Consulting', sub: 'Ongoing implementation & guidance', desc: 'Multi-year roadmap, report preparation, third-party GHG verification, and ongoing improvement advisory.' },\n    ];\n    const steps = [\n      { num: '01', name: 'Initial Assessment', sub: 'Where you stand', desc: 'A focused scoping engagement that maps your exposure and readiness, and frames the work ahead.' },\n      { num: '02', name: 'Baseline Audit', sub: 'What the gaps are', desc: 'A deep diagnostic that establishes your baseline and pinpoints the gaps between today and compliant, optimised operations.' },\n      { num: '03', name: 'Advisory Consulting', sub: 'How we get there', desc: 'Ongoing implementation and guidance that turns the roadmap into delivered outcomes.' },\n    ];\n    const programs = [\n      'Corporate ESG Masterclass', 'ESG Fundamentals', 'BRSR & GRI Reporting', 'GHG Accounting & Scope 3',\n      'Energy Management & Auditing', 'Sustainable Procurement & Supply-Chain ESG', 'ESG for Boards & Leadership',\n    ];\n\n    return {\n      navOpen: this.state.navOpen,\n      divOpen: this.state.divOpen,\n      submitted: this.state.submitted,\n      submitError: this.state.submitError,\n      notSubmitted: !this.state.submitted,\n      toggleNav: () => this.setState((s) => ({ navOpen: !s.navOpen })),\n      openDiv: () => this.setState({ divOpen: true }),\n      closeDiv: () => this.setState({ divOpen: false }),\n      submitForm: async (e) => {\n        e.preventDefault();\n        const fd = new FormData(e.target);\n        try {\n          const r = await fetch('https://saramdigitech.com/contact.php', {\n            method: 'POST', body: fd\n          });\n          if (r.ok) {\n            this.setState({ submitted: true, submitError: false });\n          } else {\n            this.setState({ submitError: true });\n          }\n        } catch (_) {\n          this.setState({ submitError: true });\n        }\n      },\n      aribaServices, esgPillars, bridgePoints, aribaTiers, esgTiers, steps, programs,\n    };\n  }\n}\n<\/script>\n\n\n<\/body><\/html>"
